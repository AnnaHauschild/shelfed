<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shelfed — Background Preview</title>
<style>
  :root {
    --wood-1: #7a4a22;
    --wood-2: #5a3618;
    --wood-3: #3e2410;
    --wood-darker: #28180b;
    --cubby-bg: #2a1808;
    --frame: #7a4a22;
    --frame-edge: #3e2410;
    --leaf-dark: #4f6b35;
    --leaf-light: #7a9658;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #f4e4c1;
  }
  body {
    padding: 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 32px;
    justify-content: center;
    align-items: flex-start;
  }
  .label {
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 12px;
    color: #c8862b;
  }
  .frame {
    width: 390px;
    height: 844px;
    position: relative;
    overflow: hidden;
    border-radius: 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    background: #1d140c;
  }
  .download-hint {
    width: 100%;
    text-align: center;
    color: #888;
    font-size: 12px;
    margin-top: 12px;
  }
  /* ---------- CUBBIES variant ---------- */
  .cubbies .wood {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, var(--wood-1) 0%, var(--wood-2) 55%, var(--wood-3) 100%);
  }
  .cubbies .grid {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-rows: repeat(5, 1fr);
    padding: 6px;
    gap: 0;
  }
  .cubbies .row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .cubby {
    background: var(--frame);
    border: 1px solid var(--frame-edge);
    padding: 4px;
    box-sizing: border-box;
  }
  .cubby-inner {
    width: 100%;
    height: 100%;
    background: var(--cubby-bg);
    border-radius: 1px;
    overflow: hidden;
    padding: 4px;
    box-sizing: border-box;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
  }
  .books {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 1px;
  }
  .book {
    border-radius: 1px;
  }
  .lamp {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    flex-direction: column-reverse;
    position: relative;
  }
  .lamp .shade {
    width: 55%;
    height: 32%;
    background: #f0d28c;
    border-radius: 20px 20px 3px 3px;
  }
  .lamp .glow {
    position: absolute;
    width: 90%;
    height: 70%;
    bottom: 15%;
    background: rgba(255,210,120,0.32);
    border-radius: 100px;
  }
  .lamp .base {
    width: 8%;
    height: 40%;
    background: #3a2410;
  }
  .photo {
    width: 78%;
    height: 78%;
    border: 1px solid #f3e7d2;
    border-radius: 6px;
  }
  .leaf {
    position: absolute;
    border-radius: 50%;
  }
  /* Cubby vignette */
  .cubbies .vignette {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      rgba(28,18,8,0.385) 0%,
      rgba(28,18,8,0.55) 50%,
      rgba(28,18,8,0.385) 100%);
    pointer-events: none;
  }
  /* ---------- WALL variant ---------- */
  .wall .wood {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, var(--wood-2) 0%, var(--wood-3) 55%, var(--wood-darker) 100%);
  }
  .wall .hanging-lamp {
    position: absolute;
    top: 0;
    right: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wall .cord {
    width: 2px;
    height: 60px;
    background: #2a1808;
  }
  .wall .shade {
    width: 78px;
    height: 46px;
    background: #f0d28c;
    border-radius: 40px 40px 4px 4px;
  }
  .wall .lamp-glow {
    position: absolute;
    top: 50px;
    width: 140px;
    height: 90px;
    border-radius: 100px;
    background: rgba(255,210,120,0.30);
  }
  .wall .pool {
    position: absolute;
    top: 40px;
    right: -40px;
    width: 320px;
    height: 320px;
    border-radius: 240px;
    background: rgba(255,200,110,0.10);
  }
  .wall .plant {
    position: absolute;
    top: 0;
    left: 28px;
    width: 70px;
    height: 120px;
  }
  .wall .pot {
    position: absolute;
    top: 0;
    left: 18px;
    width: 34px;
    height: 18px;
    background: #5a3a22;
    border-radius: 2px 2px 6px 6px;
  }
  .wall .pleaf {
    position: absolute;
    width: 14px;
    height: 22px;
    border-radius: 14px;
    background: var(--leaf-dark);
  }
  .wall .pleaf.light { background: var(--leaf-light); }
  .wall .vignette {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      rgba(15,9,4,0.33) 0%,
      rgba(15,9,4,0.55) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div>
  <div class="label">Cubbies — Discover</div>
  <div class="frame cubbies" id="cubbies">
    <div class="wood"></div>
    <div class="grid" id="grid"></div>
    <div class="vignette"></div>
  </div>
  <div class="download-hint">Rechtsklick &rarr; "Bild speichern" funktioniert nicht (kein PNG). Stattdessen Screenshot machen.</div>
</div>

<div>
  <div class="label">Wall — Shelf</div>
  <div class="frame wall">
    <div class="wood"></div>
    <div class="hanging-lamp">
      <div class="cord"></div>
      <div class="shade"></div>
      <div class="lamp-glow"></div>
    </div>
    <div class="pool"></div>
    <div class="plant">
      <div class="pot"></div>
      <div class="pleaf light" style="top:14px; left:6px;  transform:rotate(-35deg)"></div>
      <div class="pleaf"       style="top:22px; left:44px; transform:rotate(40deg)"></div>
      <div class="pleaf"       style="top:38px; left:2px;  transform:rotate(-55deg)"></div>
      <div class="pleaf light" style="top:50px; left:50px; transform:rotate(60deg)"></div>
      <div class="pleaf"       style="top:68px; left:10px; transform:rotate(-30deg)"></div>
      <div class="pleaf light" style="top:86px; left:38px; transform:rotate(50deg)"></div>
    </div>
    <div class="vignette"></div>
  </div>
  <div class="download-hint">Screenshot, oder Browser-Devtools &rarr; "Capture node screenshot" auf .frame</div>
</div>

<script>
  // Same deterministic rand as the RN component
  const BOOK_PALETTE = [
    '#a7563d','#7a3527','#5e7a3c','#3f6079',
    '#d8a548','#8a5a2b','#b89b73','#2c4a3a'
  ];
  const LEAF_GREEN = '#4f6b35';
  const LEAF_GREEN_LIGHT = '#7a9658';
  function rand(seed) {
    const x = Math.sin(seed * 9301 + 49297) * 233280;
    return x - Math.floor(x);
  }
  function buildLayout(cols, rows) {
    const grid = [];
    let i = 0;
    for (let r = 0; r < rows; r++) {
      const row = [];
      for (let c = 0; c < cols; c++) {
        const roll = rand(i * 7 + 3);
        let kind;
        if (roll < 0.55) kind = 'book';
        else if (roll < 0.7) kind = 'lamp';
        else if (roll < 0.82) kind = 'leaf';
        else if (roll < 0.92) kind = 'photo';
        else kind = 'empty';
        row.push({ kind, seed: i });
        i++;
      }
      grid.push(row);
    }
    return grid;
  }
  function renderBooks(seed) {
    const count = 4 + Math.floor(rand(seed + 11) * 4);
    let html = '<div class="books">';
    for (let i = 0; i < count; i++) {
      const colorIdx = Math.floor(rand(seed * 31 + i) * BOOK_PALETTE.length);
      const w = 9 + rand(seed + i * 17) * 8;
      const h = 65 + rand(seed + i * 23) * 30;
      const tilt = rand(seed + i * 41) < 0.12 ? (rand(seed + i) - 0.5) * 8 : 0;
      html += `<div class="book" style="
        width:${w}%; height:${h}%;
        background:${BOOK_PALETTE[colorIdx]};
        transform:rotate(${tilt}deg);
      "></div>`;
    }
    html += '</div>';
    return html;
  }
  function renderLamp() {
    return '<div class="lamp"><div class="base"></div><div class="shade"></div><div class="glow"></div></div>';
  }
  function renderLeaves(seed) {
    let html = '';
    for (let i = 0; i < 5; i++) {
      const left = 10 + rand(seed + i * 13) * 70;
      const top  = rand(seed + i * 19) * 60;
      const size = 10 + rand(seed + i * 7) * 8;
      const tone = i % 2 === 0 ? LEAF_GREEN : LEAF_GREEN_LIGHT;
      const rot  = rand(seed + i) * 360;
      html += `<div class="leaf" style="
        left:${left}%; top:${top}%;
        width:${size}px; height:${size * 1.4}px;
        background:${tone}; transform:rotate(${rot}deg);
      "></div>`;
    }
    return html;
  }
  function renderPhoto(seed) {
    const colorIdx = Math.floor(rand(seed + 5) * BOOK_PALETTE.length);
    return `<div class="photo" style="background:${BOOK_PALETTE[colorIdx]}"></div>`;
  }

  const grid = buildLayout(4, 5);
  const gridEl = document.getElementById('grid');
  for (const row of grid) {
    const rowEl = document.createElement('div');
    rowEl.className = 'row';
    for (const cell of row) {
      const c = document.createElement('div');
      c.className = 'cubby';
      const inner = document.createElement('div');
      inner.className = 'cubby-inner';
      if (cell.kind === 'book')  inner.innerHTML = renderBooks(cell.seed);
      if (cell.kind === 'lamp')  inner.innerHTML = renderLamp();
      if (cell.kind === 'leaf')  inner.innerHTML = renderLeaves(cell.seed);
      if (cell.kind === 'photo') inner.innerHTML = renderPhoto(cell.seed);
      c.appendChild(inner);
      rowEl.appendChild(c);
    }
    gridEl.appendChild(rowEl);
  }
</script>
</body>
</html>
