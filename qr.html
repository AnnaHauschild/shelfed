<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelfed · Scan to open in Expo Go</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      background: #2b2118;
      color: #f3e9d8;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 22px; letter-spacing: 2px; margin: 0 0 4px; }
    p { margin: 4px 0; color: #cbb892; }
    .card {
      background: #f3e9d8;
      padding: 24px;
      border-radius: 16px;
      margin: 20px 0;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    code {
      background: #1c150f;
      color: #e8c98a;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 15px;
    }
    .steps { max-width: 380px; text-align: left; color: #e7dcc6; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>SHELFED</h1>
  <p>Point your iPhone Camera at this code</p>
  <div class="card"><div id="qr"></div></div>
  <p>or open this URL in Expo Go:</p>
  <p><code id="url"></code></p>
  <div class="steps">
    <strong>Steps:</strong>
    <ol>
      <li>Open the <b>Camera</b> app on your iPhone.</li>
      <li>Point it at the QR code above.</li>
      <li>Tap the yellow <b>"Open in Expo Go"</b> banner.</li>
    </ol>
    <p>Make sure the iPhone and this PC are on the same network (your phone's hotspot counts).</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script>
    var url = "exp://2x2cb8c-anonymous-8081.exp.direct";
    document.getElementById("url").textContent = url;
    var qr = qrcode(0, "M");
    qr.addData(url);
    qr.make();
    document.getElementById("qr").innerHTML = qr.createImgTag(8, 8);
  </script>
</body>
</html>
